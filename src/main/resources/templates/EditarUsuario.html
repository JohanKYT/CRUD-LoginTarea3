<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Usuario</title>
    <link rel="stylesheet" th:href="@{/css/editarUsuario.css}">
</head>
<body>
<main>
    <header style="margin-bottom: 20px; text-align: center;">
        <h2>Editar Usuario</h2>
    </header>

    <form th:action="@{/usuarios/guardar}" th:object="${usuario}" method="POST">

        <input type="hidden" th:field="*{id}">

        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" th:field="*{nombre}" required>

        <label for="email">Email:</label>
        <input type="email" id="email" th:field="*{email}" required>

        <button type="submit">Actualizar</button>
        <a th:href="@{/usuarios}" class="btn-cancelar">Cancelar</a>
    </form>
</main>
</body>
</html>
